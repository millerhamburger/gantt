<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DHTMLX Gantt 预览</title>
    <link rel="stylesheet" href="./codebase/sources/dhtmlxgantt.css" />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
      #gantt_here {
        /* width: 100%; */
        overflow: hidden;
        height: 100%;
      }
      .gantt_control {
        height: 60px;
        line-height: 60px;
        padding: 0 24px;
        background: #ffffff;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        position: relative;
        z-index: 10;
        flex-wrap: wrap; /* 防止屏幕过小时溢出 */
      }
      .gantt_control button {
        padding: 8px 16px;
        cursor: pointer;
        background: #ffffff;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        font-size: 14px;
        color: #333;
        transition: all 0.3s ease;
        outline: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .gantt_control button:hover {
        background: #f5f5f5;
        border-color: #40a9ff;
        color: #40a9ff;
      }
      .gantt_control button.active {
        background: #1890ff;
        color: #fff;
        border-color: #1890ff;
        box-shadow: 0 2px 4px rgba(24, 144, 255, 0.3);
      }
      .gantt_control .separator {
        width: 1px;
        height: 24px;
        background-color: #e8e8e8;
        margin: 0 8px;
      }
    </style>
  </head>
  <body>
    <div class="gantt_control">
      <button id="expand_tree">
        展开
      </button>
      <button id="collapse_tree">
        收起
      </button>
      <div class="separator"></div>
      <button id="toggle_critical" class="active">
        关键路径
      </button>
      <button id="toggle_baseline" class="active">
        基线
      </button>
      <div class="separator"></div>
      <button id="set_baseline">
        设置基线
      </button>
      <button id="clear_baselines">
        清除基线
      </button>
      <div class="separator"></div>
      <button id="scale_day" class="active">
        日
      </button>
      <button id="scale_week">周</button>
      <button id="scale_month">月</button>
      <div class="separator"></div>
      <button id="view_grid">仅表格</button>
      <button id="view_gantt">仅甘特图</button>
      <button id="view_split" class="active">
        表格+甘特图
      </button>
      <div class="separator"></div>
      <button id="toggle_data_preview">数据预览</button>
    </div>
    <div id="main_container" style="display: flex; height: calc(100% - 60px); width: 100%;">
        <div id="gantt_here" style="flex: 1; height: 100%;"></div>
        <div id="data_preview" style="width: 0px; height: 100%; border-left: 1px solid #e0e0e0; background: #f9f9f9; overflow: auto; transition: width 0.3s; display: none;">
            <div style="padding: 10px;">
                <h3 style="margin-top: 0; border-bottom: 1px solid #ddd; padding-bottom: 10px;">实时数据预览</h3>
                <pre id="json_preview" style="font-family: monospace; font-size: 12px; color: #333; white-space: pre-wrap; word-wrap: break-word;"></pre>
            </div>
        </div>
    </div>
    <script type="module">
      import GanttManager from "./codebase/sources/GanttManager.js";

      // 初始化 Gantt 管理器 (传入DOM元素)
      const ganttContainer = document.getElementById("gantt_here");
      const ganttManager = new GanttManager(ganttContainer);
      ganttManager.init();

      // --- 绑定工具栏事件开始 ---
      const expandTreeBtn = document.getElementById("expand_tree");
      const collapseTreeBtn = document.getElementById("collapse_tree");

      expandTreeBtn.addEventListener("click", () => {
          ganttManager.toggleTaskTree(true);
      });

      collapseTreeBtn.addEventListener("click", () => {
          ganttManager.toggleTaskTree(false);
      });

      const toggleCriticalBtn = document.getElementById("toggle_critical");
      toggleCriticalBtn.addEventListener("click", () => {
          const isActive = ganttManager.toggleCritical();
          isActive ? toggleCriticalBtn.classList.add("active") : toggleCriticalBtn.classList.remove("active");
      });

      const toggleBaselineBtn = document.getElementById("toggle_baseline");
      toggleBaselineBtn.addEventListener("click", () => {
          const isActive = ganttManager.toggleBaseline();
          isActive ? toggleBaselineBtn.classList.add("active") : toggleBaselineBtn.classList.remove("active");
      });

      const setBaselineBtn = document.getElementById("set_baseline");
      setBaselineBtn.addEventListener("click", () => {
          if (confirm("确定要将当前任务时间设置为基线吗？")) {
              const isActive = ganttManager.toggleBaseline(true);
              isActive ? toggleBaselineBtn.classList.add("active") : toggleBaselineBtn.classList.remove("active");
              ganttManager.setBaselineToCurrent();
          }
      });

      const clearBaselinesBtn = document.getElementById("clear_baselines");
      clearBaselinesBtn.addEventListener("click", () => {
          if (confirm("确定要清除所有任务的基线吗？")) {
              const isActive = ganttManager.toggleBaseline(false);
              isActive ? toggleBaselineBtn.classList.add("active") : toggleBaselineBtn.classList.remove("active");
              ganttManager.removeAllBaselines();
          }
      });

      const scaleButtons = {
          day: document.getElementById("scale_day"),
          week: document.getElementById("scale_week"),
          month: document.getElementById("scale_month")
      };
      Object.entries(scaleButtons).forEach(([mode, btn]) => {
          btn?.addEventListener("click", () => {
              ganttManager.setScale(mode);
              Object.values(scaleButtons).forEach(b => b?.classList.remove("active"));
              btn.classList.add("active");
          });
      });

      const viewButtons = {
          grid: document.getElementById("view_grid"),
          gantt: document.getElementById("view_gantt"),
          split: document.getElementById("view_split")
      };
      Object.entries(viewButtons).forEach(([mode, btn]) => {
          btn?.addEventListener("click", () => {
              ganttManager.setViewMode(mode);
              Object.values(viewButtons).forEach(b => b?.classList.remove("active"));
              btn.classList.add("active");
          });
      });

      let isPreviewOpen = false;
      const togglePreviewBtn = document.getElementById("toggle_data_preview");
      const previewDiv = document.getElementById("data_preview");
      const previewEl = document.getElementById("json_preview");

      function updatePreviewData() {
          if (!isPreviewOpen) return;
          const data = ganttManager.getSerializedData();
          if (previewEl) {
              previewEl.textContent = JSON.stringify(data, null, 2);
          }
      }

      togglePreviewBtn.addEventListener("click", () => {
          isPreviewOpen = !isPreviewOpen;
          if (isPreviewOpen) {
              togglePreviewBtn.classList.add("active");
              previewDiv.style.display = "block";
              requestAnimationFrame(() => {
                  previewDiv.style.width = "400px";
                  updatePreviewData();
              });
          } else {
              togglePreviewBtn.classList.remove("active");
              previewDiv.style.width = "0px";
              setTimeout(() => {
                  previewDiv.style.display = "none";
              }, 300);
          }
          setTimeout(() => ganttManager.resize(), 310);
      });

      ganttManager.setDataChangeCallback(updatePreviewData);
      // --- 绑定工具栏事件结束 ---

      // 模拟大规模数据
      function generateData(count) {
        var tasks = {
          data: [],
          links: [],
          baselines: []
        };

        var start = new Date(2024, 6, 1);
        
        tasks.data.push({ id: 1, text: "Project Root", start_date: start, type: "project", open: true });

        for (var i = 1; i < count; i++) {
          var date = new Date(start);
          date.setDate(start.getDate() + (i % 60));
          
          var duration = Math.floor(Math.random() * 10) + 1;
          
          if (i % 50 === 0) {
              tasks.data.push({ id: i + 1, text: "Sub Project " + i, start_date: date, type: "project", open: true, parent: 1 });
          } else {
              var parentId = Math.floor(i / 50) * 50 + 1;
              if (parentId === 1) parentId = 1;

              var task = { id: i + 1, text: "Task " + i, start_date: date, duration: duration, progress: Math.random(), parent: parentId };
              
              if (i % 20 === 0) {
                  task.type = "milestone"; task.duration = 0; task.text = "Milestone " + i;
              }

              tasks.data.push(task);

              if (i > 2 && Math.random() > 0.6) {
                  tasks.links.push({ id: tasks.links.length + 1, source: i, target: i + 1, type: "0" });
              }

              if (i % 3 === 0) {
                  var baselineStart = new Date(date);
                  baselineStart.setDate(date.getDate() - 2);
                  tasks.baselines.push({ task_id: i + 1, start_date: baselineStart, duration: duration + 4, end_date: new Date(baselineStart.getTime() + (duration + 4) * 24 * 60 * 60 * 1000) });
              }
          }
        }
        return tasks;
      }

      // 也可以使用原有的静态数据
      const staticData = {
          data: [
            { id: 1, start_date: "2025-04-04 00:00:00", duration: 12, text: "Project #1", progress: 0.1, parent: 0, open: true, type: "project", end_date: "2025-04-16 00:00:00" },
            { id: 2, start_date: "2025-04-04 00:00:00", duration: 2, text: "Task #1", progress: 0.5, parent: 1, open: true, end_date: "2025-04-06 00:00:00" },
            { id: 5, start_date: "2025-04-05 00:00:00", duration: 3, text: "Task #1.1", progress: 0.34, parent: 2, open: true, end_date: "2025-04-08 00:00:00" },
            { id: 6, start_date: "2025-04-09 00:00:00", duration: 4, text: "Task #1.2", progress: 0.5, parent: 2, open: true, end_date: "2025-04-13 00:00:00" },
            { id: 3, start_date: "2025-04-06 00:00:00", duration: 0, text: "Task #2", progress: 0.7, parent: 1, open: true, end_date: "2025-04-06 00:00:00", type: "milestone" },
            { id: 7, start_date: "2025-04-11 00:00:00", duration: 5, text: "Task #2.1", progress: 0.2, parent: 3, open: true, end_date: "2025-04-16 00:00:00" },
            { id: 8, start_date: "2025-04-05 00:00:00", duration: 4, text: "Task #2.2", progress: 0.9, parent: 3, open: true, end_date: "2025-04-09 00:00:00" },
            { id: 12, start_date: "2025-04-02 00:00:00", duration: 16, text: "Project #2", progress: 0, parent: 0, open: true, type: "project", end_date: "2025-04-18 00:00:00" },
            { id: 13, start_date: "2025-04-02 00:00:00", duration: 10, text: "Task #1", progress: 0.2, parent: 12, open: true, end_date: "2025-04-12 00:00:00" },
            { id: 14, start_date: "2025-04-03 00:00:00", duration: 2, text: "Task #2", progress: 0.9, parent: 12, render: "split", end_date: "2025-04-05 00:00:00" },
            { id: 18, start_date: "2025-04-06 00:00:00", duration: 1, text: "Task #2.1", progress: 0.3, parent: 14, open: true, end_date: "2025-04-07 00:00:00" },
            { id: 19, start_date: "2025-04-09 00:00:00", duration: 2, text: "Task #2.2", progress: 0.6, parent: 14, open: true, end_date: "2025-04-11 00:00:00" },
            { id: 20, start_date: "2025-04-12 00:00:00", duration: 2, text: "Task #2.3", progress: 0.5, parent: 14, open: true, end_date: "2025-04-14 00:00:00" },
            { id: 21, start_date: "2025-04-17 00:00:00", duration: 1, text: "Task #2.4", progress: 0.7, parent: 14, open: true, end_date: "2025-04-18 00:00:00" },
            { id: 15, start_date: "2025-04-05 00:00:00", duration: 3, text: "Task #3", progress: 0.6, parent: 12, open: true, end_date: "2025-04-08 00:00:00" },
            { id: 16, start_date: "2025-04-04 00:00:00", duration: 1, text: "Task #4", progress: 0.2, parent: 12, render: "split", end_date: "2025-04-05 00:00:00" },
            { id: 22, start_date: "2025-04-06 00:00:00", duration: 1, text: "Task #4.1", progress: 1, parent: 16, open: true, end_date: "2025-04-07 00:00:00" },
            { id: 23, start_date: "2025-04-08 00:00:00", duration: 2, text: "Task #4.2", progress: 1, parent: 16, open: true, end_date: "2025-04-10 00:00:00" },
            { id: 24, start_date: "2025-04-13 00:00:00", duration: 0, text: "Task #4.3", progress: 0, parent: 16, open: true, type: "milestone", end_date: "2025-04-13 00:00:00" },
            { id: 17, start_date: "2025-04-16 00:00:00", duration: 2, text: "Task #5", progress: 0.5, parent: 12, open: true, end_date: "2025-04-18 00:00:00" },
          ],
          links: [],
          baselines: [],
      };

      // 默认加载静态数据（也可以切换为 generateData(2000)）
      ganttManager.loadData(staticData);

      console.log("Gantt initialized with version:", ganttManager.gantt.version);
    </script>
  </body>
</html>
