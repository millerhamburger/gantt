<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DHTMLX Gantt 预览</title>
    <link rel="stylesheet" href="./codebase/sources/dhtmlxgantt.css" />
    <style>
      html,
      body {
        height: 100%;
        padding: 0;
        margin: 0;
        overflow: hidden;
      }
      #gantt_here {
        width: 100%;
        height: calc(100% - 50px);
      }
      .gantt_control {
        height: 60px;
        line-height: 60px;
        padding: 0 24px;
        background: #ffffff;
        border-bottom: 1px solid #e0e0e0;
        display: flex;
        align-items: center;
        gap: 12px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        position: relative;
        z-index: 10;
      }
      .gantt_control button {
        padding: 8px 16px;
        cursor: pointer;
        background: #ffffff;
        border: 1px solid #d9d9d9;
        border-radius: 6px;
        font-size: 14px;
        color: #333;
        transition: all 0.3s ease;
        outline: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .gantt_control button:hover {
        background: #f5f5f5;
        border-color: #40a9ff;
        color: #40a9ff;
      }
      .gantt_control button.active {
        background: #1890ff;
        color: #fff;
        border-color: #1890ff;
        box-shadow: 0 2px 4px rgba(24, 144, 255, 0.3);
      }
      .gantt_control .separator {
        width: 1px;
        height: 24px;
        background-color: #e8e8e8;
        margin: 0 8px;
      }
    </style>
  </head>
  <body>
    <div class="gantt_control">
      <button id="toggle_critical" class="active" onclick="toggleCritical()">
        关键路径
      </button>
      <button id="toggle_baseline" class="active" onclick="toggleBaseline()">
        基线
      </button>
      <div class="separator"></div>
      <button id="scale_day" class="active" onclick="setScale('day')">
        日
      </button>
      <button id="scale_week" onclick="setScale('week')">周</button>
      <button id="scale_month" onclick="setScale('month')">月</button>
      <div class="separator"></div>
      <button id="view_grid" onclick="setViewMode('grid')">仅表格</button>
      <button id="view_gantt" onclick="setViewMode('gantt')">仅甘特图</button>
      <button id="view_split" class="active" onclick="setViewMode('split')">
        表格+甘特图
      </button>
    </div>
    <div id="gantt_here"></div>
    <script type="module">
      import { gantt } from "./codebase/sources/dhtmlxgantt.es.js";
      import { locale } from "./codebase/sources/config/locale.es.js";

      // 暴露给 window 以便 HTML 按钮调用
      window.toggleCritical = function () {
        gantt.config.highlight_critical_path =
          !gantt.config.highlight_critical_path;

        const btn = document.getElementById("toggle_critical");
        if (gantt.config.highlight_critical_path) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }

        gantt.render();
      };

      window.toggleBaseline = function () {
        // 简单的切换基线显示逻辑
        if (!gantt.config.baselines) {
          gantt.config.baselines = { render_mode: false };
        }

        // 切换 render_mode
        if (!gantt.config.baselines.render_mode) {
          gantt.config.baselines.render_mode = "separateRow";
        } else {
          gantt.config.baselines.render_mode = false;
        }

        const btn = document.getElementById("toggle_baseline");
        if (gantt.config.baselines.render_mode) {
          btn.classList.add("active");
        } else {
          btn.classList.remove("active");
        }

        gantt.render();
      };

      window.setScale = function (mode) {
        const modes = ["day", "week", "month"];
        modes.forEach((m) => {
          const btn = document.getElementById("scale_" + m);
          if (m === mode) btn.classList.add("active");
          else btn.classList.remove("active");
        });

        if (mode === "day") {
          gantt.config.scales = [
            { unit: "month", step: 1, format: "%Y年%F" },
            { unit: "day", step: 1, format: "%d日" },
          ];
        } else if (mode === "week") {
          gantt.config.scales = [
            { unit: "month", step: 1, format: "%Y年%F" },
            { unit: "week", step: 1, format: "%W周" },
          ];
        } else if (mode === "month") {
          gantt.config.scales = [
            { unit: "year", step: 1, format: "%Y年" },
            { unit: "month", step: 1, format: "%M" },
          ];
        }
        gantt.render();
      };

      window.setViewMode = function (mode) {
        // 更新按钮状态
        const modes = ["grid", "gantt", "split"];
        modes.forEach((m) => {
          const btn = document.getElementById("view_" + m);
          if (m === mode) btn.classList.add("active");
          else btn.classList.remove("active");
        });

        if (mode === "grid") {
            // 仅表格模式
            gantt.config.show_grid = true;
            gantt.config.show_chart = false;
            // 确保表格宽度占满，或者足够大
            gantt.config.grid_width = document.documentElement.clientWidth - 20; 
        } else if (mode === "gantt") {
            // 仅甘特图模式
            gantt.config.show_grid = false;
            gantt.config.show_chart = true;
        } else {
            // 表格+甘特图模式 (split)
            gantt.config.show_grid = true;
            gantt.config.show_chart = true;
            const docWidth = document.documentElement.clientWidth;
            const gridWidth = docWidth / 2;
            gantt.config.grid_width = gridWidth > 1000 ? gridWidth : 1000;
        }
        gantt.render();
      };

      // 获取文档流宽度
      const docWidth = document.documentElement.clientWidth;
      const gridWidth = docWidth / 2;

      // 配置甘特图
      // gantt.config.date_format = "%Y-%m-%d %H:%i";
      // gantt.config.date_format = "%Y-%m-%d %H:%i:%s";

      gantt.config.grid_width = gridWidth > 1000 ? gridWidth : 1000;

      gantt.config.scales = [
        { unit: "month", step: 1, format: "%Y年%F" },
        { unit: "day", step: 1, format: "%j日" },
      ];

      gantt.config.resize_rows = true;
      gantt.config.row_height = 30;
      gantt.config.min_task_grid_row_height = 10;
      gantt.config.open_split_tasks = true;

      gantt.config.baselines.render_mode = "separateRow";

      // 显示空状态
      gantt.config.show_empty_state = true;

      gantt.plugins({
        /*!*/ critical_path: true /*!*/,
        tooltip: true
      }); /*!*/

      gantt.config.highlight_critical_path = true;

      gantt.templates.tooltip_date_format = gantt.date.date_to_str("%Y/%m/%d");
      gantt.attachEvent("onGanttReady", function () {
        var tooltips = gantt.ext.tooltips;

        gantt.templates.tooltip_text = function (start, end, task) {
          return "<b>任务名称:</b> " + task.text + "<br/>" +
            "<b>时间范围:</b> " + gantt.templates.tooltip_date_format(start) + "-" + gantt.templates.tooltip_date_format(end) + "<br/>" +
            "<b>工期:</b> " + task.duration + "天" + "<br/>" +
            "<b>完成度:</b> " + Math.round(task.progress * 100) + "%"
        }
      })

      gantt.config.columns = [
        { name: "text", label: "任务名称", width: "*", tree: true },
        {
          name: "base_start_date",
          label: "基线开始时间",
          width: 100,
          align: "center",
          template: function (task) {
            const baselines = gantt.getTaskBaselines(task.id);
            if (baselines && baselines.length !== 0) {
              return baselines.reduce(
                (prev, cur) => {
                  if (!prev.start_date || cur.start_date < prev.start_date) {
                    prev.start_date = cur.start_date;
                  }
                  return prev;
                },
                { start_date: null },
              ).start_date;
            } else {
              return "-";
            }
          },
        },
        {
          name: "base_end_date",
          label: "基线完成时间",
          width: 100,
          align: "center",
          template: function (task) {
            const baselines = gantt.getTaskBaselines(task.id);
            if (baselines && baselines.length !== 0) {
              return baselines.reduce(
                (prev, cur) => {
                  if (!prev.end_date || cur.end_date > prev.end_date) {
                    prev.end_date = cur.end_date;
                  }
                  return prev;
                },
                { end_date: null },
              ).end_date;
            } else {
              return "-";
            }
          },
        },
        {
          name: "base_duration",
          label: "基线工期",
          align: "center",
          template: function (task) {
            const baselines = gantt.getTaskBaselines(task.id);
            if (baselines && baselines.length !== 0) {
              return baselines.reduce(
                (prev, cur) => {
                  prev.duration += cur.duration;
                  return prev;
                },
                { duration: 0 },
              ).duration;
            } else {
              return "-";
            }
          },
        },
        { name: "start_date", label: "开始时间", width: 100, align: "center" },
        { name: "end_date", label: "完成时间", width: 100, align: "center" },
        {
          name: "duration",
          label: "工期",
          align: "center",
          template: function (task) {
            return task.duration + "天";
          },
        },
        {
          name: "status",
          label: "执行情况",
          align: "center",
          template: function (task) {
            if (task.progress === 0) {
              return "未开始";
            }
            return task.progress === 1 ? "已完成" : "进行中";
          },
        },
        {
          name: "progress",
          label: "完成比例",
          align: "center",
          template: function (task) {
            return Math.round(task.progress * 100) + "%";
          },
        },
        // {
        //   name: "owner",
        //   label: "负责人",
        //   width: 80,
        //   align: "center",
        //   template: function (task) {
        //     return task.owner || "-";
        //   },
        // },
        // 相关方
        // {
        //   name: "related",
        //   label: "相关方",
        //   width: 80,
        //   align: "center",
        //   template: function (task) {
        //     return task.related || "-";
        //   },
        // },
        // 前置任务
        // {
        //   name: "predecessors",
        //   label: "前置任务",
        //   width: 80,
        //   align: "center",
        //   template: function (task) {
        //     return task.predecessors || "-";
        //   },
        // },
        // 任务描述
        {
          name: "description",
          label: "任务描述",
          width: 150,
          align: "center",
          template: function (task) {
            return task.description || "-";
          },
        },

        { name: "add", label: "", width: 44 },
      ];

      // 默认的 lightbox 定义
      gantt.config.lightbox.sections = [
        {
          name: "任务名称",
          height: 70,
          map_to: "text",
          type: "textarea",
          focus: true,
        },
        { name: "任务类型", type: "typeselect", map_to: "type" },
        { name: "time", height: 72, map_to: "auto", type: "duration" },
        {
          name: "父任务",
          type: "parent",
          allow_root: "true",
          root_label: "无父任务",
        },
        {
          name: "任务描述",
          height: 70,
          map_to: "description",
          type: "textarea",
          placeholder: "请输入任务描述",
        },
        { name: "基线", height: 100, type: "baselines", map_to: "baselines" },
      ];

      gantt.config.lightbox.project_sections = [
        {
          name: "任务名称",
          height: 70,
          map_to: "text",
          type: "textarea",
          focus: true,
        },
        { name: "任务类型", type: "typeselect", map_to: "type" },
        {
          name: "父任务",
          type: "parent",
          allow_root: "true",
          root_label: "无父任务",
        },
        {
          name: "任务描述",
          height: 70,
          map_to: "description",
          type: "textarea",
          placeholder: "请输入任务描述",
        },
        { name: "基线", height: 100, type: "baselines", map_to: "baselines" },
      ];

      gantt.config.lightbox.milestone_sections = [
        {
          name: "任务名称",
          height: 70,
          map_to: "text",
          type: "textarea",
          focus: true,
        },
        { name: "任务类型", type: "typeselect", map_to: "type" },
        {
          name: "time",
          single_date: true,
          height: 72,
          map_to: "auto",
          type: "duration",
        },
        {
          name: "父任务",
          type: "parent",
          allow_root: "true",
          root_label: "无父任务",
        },
        {
          name: "任务描述",
          height: 70,
          map_to: "description",
          type: "textarea",
          placeholder: "请输入任务描述",
        },
        { name: "基线", height: 100, type: "baselines", map_to: "baselines" },
      ];

      // 中文
      gantt.i18n.addLocale("cn", locale);
      gantt.i18n.setLocale("cn");

      // 模拟大规模数据
      function generateData(count) {
        var tasks = {
          data: [],
          links: [],
          baselines: [] // 也生成一些基线数据
        };

        var start = new Date(2024, 6, 1);
        
        // 创建一个根项目
        tasks.data.push({
            id: 1,
            text: "Project Root",
            start_date: start,
            type: "project",
            open: true
        });

        for (var i = 1; i < count; i++) {
          var date = new Date(start);
          date.setDate(start.getDate() + (i % 60)); // 分散在两个月内
          
          var duration = Math.floor(Math.random() * 10) + 1;
          var parent = 1;
          
          // 每50个任务创建一个子项目节点，构建层级
          if (i % 50 === 0) {
              tasks.data.push({
                  id: i + 1,
                  text: "Sub Project " + i,
                  start_date: date,
                  type: "project",
                  open: true, // 默认折叠以提高初始加载感知性能
                  parent: 1
              });
          } else {
              // 寻找最近的子项目作为父节点
              var parentId = Math.floor(i / 50) * 50 + 1;
              if (parentId === 1) parentId = 1; // 前49个挂在根节点

              var task = {
                id: i + 1,
                text: "Task " + i,
                start_date: date,
                duration: duration,
                progress: Math.random(),
                parent: parentId
              };
              
              // 随机添加一些里程碑
              if (i % 20 === 0) {
                  task.type = "milestone";
                  task.duration = 0;
                  task.text = "Milestone " + i;
              }

              tasks.data.push(task);

              // 随机生成链接
              if (i > 2 && Math.random() > 0.6) {
                  tasks.links.push({
                      id: tasks.links.length + 1,
                      source: i, // 链接到前一个任务
                      target: i + 1,
                      type: "0" // finish_to_start
                  });
              }

              // 随机生成基线
              if (i % 3 === 0) {
                  var baselineStart = new Date(date);
                  baselineStart.setDate(date.getDate() - 2); // 基线比计划早两天
                  tasks.baselines.push({
                      task_id: i + 1,
                      start_date: baselineStart,
                      duration: duration + 4, // 基线工期稍长
                      end_date: new Date(baselineStart.getTime() + (duration + 4) * 24 * 60 * 60 * 1000)
                  });
              }
          }
        }
        return tasks;
      }

      // 初始化数据
      // const data = { ... } // 注释掉旧数据
      const data = generateData(2000);

      // 初始化
      gantt.init("gantt_here");
      gantt.parse({
        data: [
          {id: 1, text: "Office itinerancy", open: true, type: "project"},
          {id: 2, text: "Office facing", start_date: "22-07-2024", duration: "20", parent: "1"},
          {id: 3, text: "Furniture installation", start_date: "22-07-2024", duration: "5", parent: "1"},
          {id: 4, text: "The employee relocation", start_date: "29-07-2024", duration: "15", parent: "1"},
          {id: 5, text: "Interior office", start_date: "29-07-2024", duration: "15", parent: "1"},
          {id: 6, text: "Air conditioners installation", start_date: "19-08-2024", duration: "2", parent: "1"},
          {id: 7, text: "Workplaces preparation", start_date: "21-08-2024", duration: "2", parent: "1"},
          {id: 8, text: "Preparing workplaces for us", start_date: "22-07-2024", duration: "10", parent: "1"},
          {id: 9, text: "Workplaces importation", start_date: "23-08-2024", duration: "1", parent: "1"},
          {id: 10, text: "Analysis", open: true, type: "project"},
          {id: 11, text: "Documentation creation", start_date: "26-08-2024", duration: "14", parent: "10"},
          {id: 12, text: "Software design", start_date: "26-08-2024", duration: "10", parent: "10"},
          {id: 13, text: "Interface setup", start_date: "13-09-2024", duration: "1", parent: "10"},
          {id: 14, text: "Development", open: true, type: "project"},
          {id: 15, text: "Develop System", start_date: "16-09-2024", duration: "5", parent: "14"},
          {id: 16, text: "Integrate System", start_date: "16-09-2024", duration: "15", parent: "14"},
          {id: 17, text: "Test", start_date: "07-10-2024", duration: "1", parent: "14"}
        ],
        links: [
          {id: "1", source: "3", target: "4", type: "0"},
          {id: "2", source: "3", target: "5", type: "0"},
          {id: "3", source: "2", target: "6", type: "0"},
          {id: "4", source: "4", target: "6", type: "0"},
          {id: "5", source: "5", target: "6", type: "0"},
          {id: "6", source: "6", target: "7", type: "0"},
          {id: "7", source: "7", target: "9", type: "0"},
          {id: "8", source: "8", target: "9", type: "0"},
          {id: "9", source: "9", target: "10", type: "0"},
          {id: "10", source: "9", target: "11", type: "0"},
          {id: "11", source: "9", target: "12", type: "0"},
          {id: "12", source: "11", target: "13", type: "0"},
          {id: "13", source: "12", target: "13", type: "0"},
          {id: "14", source: "13", target: "14", type: "0"},
          {id: "15", source: "13", target: "15", type: "0"},
          {id: "16", source: "15", target: "17", type: "0"},
          {id: "17", source: "16", target: "17", type: "0"}
        ]
      });

      console.log("Gantt initialized with version:", gantt.version);
    </script>
  </body>
</html>
